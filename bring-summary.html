<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>持参見込みサマリ | 株クラ新緑ピクニック会 2026</title>
  <meta name="description" content="株クラ新緑ピクニック会・春の陣2026のQ5/Q6を元に、足りないものとあると変しいものを整理したページ" />
  <style>
    :root { --bg-a:#f5f0e6; --bg-b:#e7f0e4; --ink:#243228; --muted:#566458; --line:#c8d6ca; --card:#fffdfa; --accent:#2f7d5a; --accent-soft:#e8f4ee; --warn:#b3742f; --warn-soft:#fff1e2; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif; background:radial-gradient(1000px 500px at 0% -10%, #fff8ea 0%, transparent 60%),radial-gradient(1000px 500px at 100% 0%, #e5f5ee 0%, transparent 60%),linear-gradient(160deg,var(--bg-a),var(--bg-b)); line-height:1.65; }
    .wrap { width:min(1120px,92vw); margin:0 auto; padding:34px 0 64px; }
    .card { border:1px solid var(--line); border-radius:20px; background:rgba(255,255,255,.8); backdrop-filter:blur(4px); box-shadow:0 14px 34px rgba(41,72,56,.1); padding:22px; }
    h1 { margin:0 0 8px; font-size:clamp(1.6rem,4vw,2.5rem); line-height:1.2; }
    .lead { margin:0; color:var(--muted); }
    .pills { margin-top:12px; display:flex; flex-wrap:wrap; gap:10px; }
    .pill { border-radius:999px; border:1px solid var(--line); padding:7px 12px; font-size:.9rem; font-weight:700; background:var(--accent-soft); color:#1f5f43; }
    .grid { margin-top:16px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .sub { margin:0 0 10px; font-size:1.1rem; display:flex; align-items:center; gap:8px; }
    .dot { width:10px; height:10px; border-radius:50%; background:var(--accent); display:inline-block; flex:0 0 auto; }
    .dot.warn { background:var(--warn); }
    .list { margin:0; padding-left:1.1rem; display:grid; gap:8px; font-size:.95rem; }
    .table-wrap { margin-top:14px; }
    table { width:100%; border-collapse:collapse; font-size:.93rem; }
    th,td { text-align:left; vertical-align:top; border-bottom:1px solid var(--line); padding:9px 8px; }
    th { color:var(--muted); font-weight:700; background:var(--warn-soft); }

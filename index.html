<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>株クラ新緑ピクニック会 2026 | Q1・Q3〜Q7</title>
  <meta name="description" content="株クラ新緑ピクニック会・春の陣2026の回答からQ1,Q3,Q4,Q5,Q6,Q7を抜き出した公開ページ" />
  <style>
    :root {
      --bg-1: #f8f4ec;
      --bg-2: #e5efe3;
      --ink: #243027;
      --muted: #4d5b51;
      --line: #c6d4c6;
      --card: #fffefb;
      --accent: #2f7d5a;
      --accent-soft: #e9f5ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, #fff9e7 0%, transparent 55%),
        radial-gradient(1200px 600px at 95% 0%, #e8f6ee 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      line-height: 1.6;
    }

    .wrap {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: 40px 0 64px;
    }

    header {
      margin-bottom: 20px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(4px);
      box-shadow: 0 14px 40px rgba(40, 68, 54, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 4vw, 2.8rem);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .summary {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--accent-soft);
      font-size: 0.9rem;
      font-weight: 600;
      color: #1f5f43;
    }

    .list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      padding: 16px;
      box-shadow: 0 10px 26px rgba(39, 72, 55, 0.08);
      animation: fade-up 0.45s ease both;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 700;
    }

    dl {
      margin: 0;
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 8px 12px;
    }

    dt {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.95rem;
    }

    dd {
      margin: 0;
      font-size: 0.96rem;
      white-space: pre-wrap;
    }

    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: right;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(680px, 94vw);
        padding-top: 24px;
      }

      header {
        padding: 18px;
      }

      dl {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      dt {
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>株クラ新緑ピクニック会・春の陣2026</h1>
      <p class="lead">Googleフォーム回答から <strong>Q1 / Q3 / Q4 / Q5 / Q6 / Q7</strong> のみを抽出して表示しています。</p>
      <div class="summary">
        <span class="pill">表示件数: 1件</span>
        <span class="pill">公開先: GitHub Pages</span>
      </div>
    </header>

    <main class="list">
      <article class="card">
        <h2><span class="badge">1</span> Mee</h2>
        <dl>
          <dt>Q1 お名前/ハンドル</dt>
          <dd>Mee</dd>

          <dt>Q3 参加予定</dt>
          <dd>参加予定</dd>

          <dt>Q4 参加予定時間帯</dt>
          <dd>13:00ごろから参加予定</dd>

          <dt>Q5 持参予定の飲食物</dt>
          <dd>クラフトビール350ml缶×数本、おつまみなど</dd>

          <dt>Q6 持参予定品の扱い</dt>
          <dd>これから考えます</dd>

          <dt>Q7 運営への連絡事項</dt>
          <dd>盛り上がるように頑張ります！</dd>
        </dl>
      </article>
    </main>

    <footer>抽出列: Q1, Q3, Q4, Q5, Q6, Q7</footer>
  </div>
</body>
</html>
